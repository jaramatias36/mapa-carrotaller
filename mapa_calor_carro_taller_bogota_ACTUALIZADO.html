<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mapa de Calor · Demanda Carro Taller Bogotá</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --bg:#0f1420;--panel:#161d2e;--panel2:#1e2740;--ink:#e8edf7;--muted:#8a97b4;
    --accent:#4da3ff;--accent2:#ffc048;--line:#2a3550;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
  header{padding:14px 20px;border-bottom:1px solid var(--line);background:var(--panel);display:flex;align-items:center;justify-content:space-between;gap:12px}
  header h1{margin:0;font-size:18px}
  #btnFiltros{display:block;padding:8px 14px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);color:#04101f;font-weight:700;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap}
  .wrap{display:flex;height:calc(100vh - 62px);min-height:520px}
  #map{flex:1;background:#0a0e17}
  aside{width:330px;background:var(--panel);border-left:1px solid var(--line);padding:16px 16px 30px;overflow-y:auto;transition:width .28s ease,padding .28s ease;flex:none}
  aside.hidden{width:0;padding:0;overflow:hidden;border-left:none}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:13px 14px;margin-bottom:13px}
  .card h3{margin:0 0 9px;font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700}
  label.blk{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px}
  select{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:13px;font-family:inherit}
  .seg{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
  .seg button{flex:1 0 auto;padding:6px 9px;cursor:pointer;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:13px;font-family:inherit;transition:.15s}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#04101f;font-weight:700}
  .stat{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .stat:last-child{border:none}.stat b{font-size:15px;color:var(--accent2)}
  .zrow{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:12px}
  .dot{width:12px;height:12px;border-radius:50%;flex:none}
  .bar{height:6px;border-radius:4px;margin-top:3px}
  .legend{position:absolute;bottom:16px;left:16px;background:rgba(255,255,255,.94);border:1px solid #d3d9e6;border-radius:9px;padding:10px 12px;font-size:11px;z-index:800;color:#2a3550;box-shadow:0 2px 10px rgba(0,0,0,.15)}
  .grad{height:9px;width:160px;border-radius:5px;margin:6px 0 3px;background:linear-gradient(90deg,#1a2056,#2450b4,#18aad6,#36d28c,#f0c83c,#f88228,#e61e1e)}
  .grad-lab{display:flex;justify-content:space-between;color:var(--muted)}
  .legend .grad-lab span{color:#6b7690}
  .toggle{display:flex;gap:6px;margin-top:8px}
  .toggle button{cursor:pointer;font-size:12px;flex:1;padding:5px;border-radius:7px;border:1px solid #cbd2e0;background:#f1f4fa;color:#2a3550}
  .toggle button.on{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  .note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:4px}
  .moto-pin{background:none;border:none}
  .leaflet-popup-content-wrapper{background:var(--panel2);color:var(--ink);border-radius:8px}
  .leaflet-popup-tip{background:var(--panel2)}

  /* --- Móvil: el panel de filtros se pliega y el mapa queda visible --- */
  @media (max-width: 760px){
    #btnFiltros{display:block}
    .wrap{flex-direction:column;height:calc(100vh - 60px)}
    #map{flex:1;min-height:60vh;order:2}
    aside{
      width:100%;border-left:none;border-bottom:1px solid var(--line);
      order:1;max-height:0;padding:0 14px;overflow:hidden;
      transition:max-height .28s ease, padding .28s ease;
    }
    aside.open{max-height:60vh;padding:14px;overflow-y:auto}
    header h1{font-size:15px;line-height:1.25}
    .legend{transform:scale(.9);transform-origin:bottom left}
  }</style>
</head>
<body>
<header>
  <h1>Mapa de calor · Demanda de carro taller en Bogotá</h1>
  <button id="btnFiltros" onclick="toggleFiltros()">Filtros ▴</button>
</header>
<div class="wrap">
  <div id="map">
    <div class="legend">
      <div>Servicios por km² <span style="color:var(--muted)">(escala del filtro)</span></div>
      <div class="grad"></div>
      <div class="grad-lab"><span>menos</span><span>más demanda</span></div>
      <div class="toggle">
        <button id="tHeat" class="on" onclick="toggleLayer('heat')">Calor</button>
        <button id="tGrid" onclick="toggleLayer('grid')">Grilla</button>
      </div>
    </div>
  </div>
  <aside id="panel">
    <div class="card">
      <h3>Filtros temporales</h3>
      <label class="blk">Día de la semana</label>
      <div class="seg" id="segDia">
        <button class="on" data-d="all">Todos</button>
        <button data-d="Lun-Jue">Lun–Jue</button>
        <button data-d="Viernes">Vie</button>
        <button data-d="Sábado">Sáb</button>
        <button data-d="Domingo">Dom</button>
      </div>
      <label class="blk">Franja horaria</label>
      <select id="selFranja">
        <option value="all">Todas las horas</option>
        <option>00-06 Madrugada</option><option>06-09 Mañana pico</option>
        <option>09-12 Media mañana</option><option>12-15 Mediodía</option>
        <option>15-18 Tarde</option><option>18-21 Noche pico</option><option>21-24 Noche</option>
      </select>
      <label class="blk">Campaña (aseguradora)</label>
      <select id="selCampana"><option value="all">Todas</option></select>
    </div>
    <div class="card">
      <h3>5 ubicaciones recomendadas</h3>
      <div class="note">Los 5 pines se recalculan según el filtro activo (día, hora y campaña) para señalar dónde conviene ubicar cada carro taller en ese escenario.</div>
    </div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

const HeatCanvas=L.Layer.extend({
  onAdd:function(m){
    this._map=m;
    this._c=L.DomUtil.create('canvas','heat-canvas');
    this._c.style.position='absolute';this._c.style.pointerEvents='none';
    m.getPanes().overlayPane.appendChild(this._c);
    m.on('moveend zoomend resize viewreset',this._draw,this);
    this._reset();this._draw();
  },
  onRemove:function(m){
    m.getPanes().overlayPane.removeChild(this._c);
    m.off('moveend zoomend resize viewreset',this._draw,this);
  },
  setCells:function(cells,maxN,satRef){this._cells=cells;this._maxN=maxN;this._satRef=satRef||0;if(this._map)this._draw();},
  _reset:function(){
    const size=this._map.getSize();
    this._c.width=size.x;this._c.height=size.y;
    const tl=this._map.containerPointToLayerPoint([0,0]);
    L.DomUtil.setPosition(this._c,tl);
  },
  _draw:function(){
    if(!this._map||!this._cells)return;
    this._reset();
    const ctx=this._c.getContext('2d');
    const W=this._c.width,H=this._c.height;
    ctx.clearRect(0,0,W,H);
    const m=this._map;
    // radio en px equivalente a ~1.1km real (respeta zoom)
    const p0=m.latLngToContainerPoint([4.66,-74.08]);
    const p1=m.latLngToContainerPoint([4.66+DATA.stepLat*1.1,-74.08]);
    const rpx=Math.max(14,Math.abs(p0.y-p1.y));

    // 1) acumular DENSIDAD en un buffer float (suma real de aportes gaussianos)
    const dens=new Float32Array(W*H);
    const R=Math.ceil(rpx);
    const two_s2=2*Math.pow(rpx*0.55,2); // sigma
    let peak=0;
    this._cells.forEach(c=>{
      const cp=m.latLngToContainerPoint([c.lat,c.lon]);
      const cx=Math.round(cp.x),cy=Math.round(cp.y);
      if(cx<-R||cx>W+R||cy<-R||cy>H+R)return;
      const w=c.n; // peso = servicios en la celda
      const x0=Math.max(0,cx-R),x1=Math.min(W-1,cx+R);
      const y0=Math.max(0,cy-R),y1=Math.min(H-1,cy+R);
      for(let y=y0;y<=y1;y++){
        const dy=y-cy;
        for(let x=x0;x<=x1;x++){
          const dx=x-cx;
          const g=Math.exp(-(dx*dx+dy*dy)/two_s2);
          const idx=y*W+x;
          dens[idx]+=w*g;
          if(dens[idx]>peak)peak=dens[idx];
        }
      }
    });
    if(peak<=0)return;

    // 2) normalizar con saturación en ~p95 para que las zonas medias-altas
    //    lleguen a rojo y no se vean lavadas
    const satRef=this._satRef>0?this._satRef:peak;
    const ramp=buildRamp();
    const img=ctx.createImageData(W,H);
    const d=img.data;
    for(let i=0;i<dens.length;i++){
      let t=dens[i]/satRef;
      if(t<=0.02)continue;   // umbral más alto: no pintar zonas casi vacías sobre fondo claro
      t=Math.min(1,t);
      t=Math.pow(t,0.78);
      const col=ramp[Math.floor(t*255)];
      const o=i*4;
      d[o]=col[0];d[o+1]=col[1];d[o+2]=col[2];
      d[o+3]=Math.round(Math.min(1,t*1.15)*175); // algo más translúcido para leer calles
    }
    ctx.putImageData(img,0,0);
  }
});
function buildRamp(){
  // térmico contundente: transparente-índigo -> azul -> cian -> verde -> ámbar -> rojo intenso
  const stops=[[0,[26,32,86]],[.18,[36,80,180]],[.38,[24,170,214]],[.55,[54,210,140]],[.72,[240,200,60]],[.86,[248,130,40]],[1,[230,30,30]]];
  const r=[];
  for(let k=0;k<256;k++){
    const t=k/255;let a=stops[0],b=stops[stops.length-1];
    for(let s=0;s<stops.length-1;s++){if(t>=stops[s][0]&&t<=stops[s+1][0]){a=stops[s];b=stops[s+1];break;}}
    const f=(t-a[0])/((b[0]-a[0])||1);
    r.push([Math.round(a[1][0]+(b[1][0]-a[1][0])*f),
            Math.round(a[1][1]+(b[1][1]-a[1][1])*f),
            Math.round(a[1][2]+(b[1][2]-a[1][2])*f)]);
  }
  return r;
}

// Agrupa en k zonas y coloca cada pin en el FOCO DE MAYOR DEMANDA de su zona
// (no en el centroide promedio, que puede caer lejos del punto rojo).
function kmeans(points,k,iters){
  if(points.length===0)return [];
  k=Math.min(k,points.length);
  let cent=[];
  const step=Math.max(1,Math.floor(points.length/k));
  for(let i=0;i<k;i++)cent.push({lat:points[i*step].lat,lon:points[i*step].lon});
  let assign=new Array(points.length).fill(0);
  for(let it=0;it<iters;it++){
    for(let i=0;i<points.length;i++){
      let best=0,bd=Infinity;
      for(let c=0;c<k;c++){
        const dl=points[i].lat-cent[c].lat, dg=points[i].lon-cent[c].lon;
        const d=dl*dl+dg*dg;
        if(d<bd){bd=d;best=c;}
      }
      assign[i]=best;
    }
    const sum=Array.from({length:k},()=>({lat:0,lon:0,n:0}));
    for(let i=0;i<points.length;i++){
      const c=assign[i];sum[c].lat+=points[i].lat;sum[c].lon+=points[i].lon;sum[c].n++;
    }
    for(let c=0;c<k;c++) if(sum[c].n>0){cent[c]={lat:sum[c].lat/sum[c].n,lon:sum[c].lon/sum[c].n};}
  }
  // agrupar puntos por cluster
  const groups=Array.from({length:k},()=>[]);
  for(let i=0;i<points.length;i++)groups[assign[i]].push(points[i]);

  // para cada grupo, colocar el pin en la CELDA de 1km con más servicios
  // (exactamente el cuadro más rojo que se ve en el mapa), y afinar al
  // centro de masa de esa celda para que caiga en el corazón del foco.
  const SL=DATA.stepLat, SG=DATA.stepLon;
  const result=[];
  groups.forEach(g=>{
    if(g.length===0)return;
    // contar servicios por celda 1km
    const bins={};
    g.forEach(p=>{
      const ci=Math.floor(p.lat/SL), cj=Math.floor(p.lon/SG);
      const key=ci+'_'+cj;
      if(!bins[key])bins[key]={ci,cj,pts:[]};
      bins[key].pts.push(p);
    });
    // celda más densa
    let best=null;
    Object.values(bins).forEach(b=>{if(!best||b.pts.length>best.pts.length)best=b;});
    // centro de masa dentro de esa celda
    let sl=0,sg=0;
    best.pts.forEach(p=>{sl+=p.lat;sg+=p.lon;});
    result.push({lat:sl/best.pts.length,lon:sg/best.pts.length,n:g.length,focoN:best.pts.length});
  });
  return result;
}

  const cells={};
  pts.forEach(p=>{const k=p.clat+','+p.clon;
    if(!cells[k])cells[k]={lat:p.clat,lon:p.clon,n:0};cells[k].n++;});
  const arr=Object.values(cells);
  const maxN=Math.max(1,...arr.map(c=>c.n));
  // referencia de saturación: percentil 95 de los conteos por celda,
  // escalado por ~1.6 para aproximar el solape acumulado de celdas vecinas.
  // Así las zonas medias-altas alcanzan el rojo en vez de verse lavadas.
  const counts=arr.map(c=>c.n).sort((a,b)=>a-b);
  const p95=counts.length?counts[Math.floor(counts.length*0.95)]:maxN;
  const satRef=Math.max(1,p95*1.6);
  heat.setCells(arr,maxN,satRef);
  if(show.heat&&!map.hasLayer(heat))heat.addTo(map);
  // grilla opcional (bordes de celda)
  gridLayer.clearLayers();
  if(show.grid){
    arr.forEach(c=>{
      const hl=DATA.stepLat/2,ll=DATA.stepLon/2;
      L.rectangle([[c.lat-hl,c.lon-ll],[c.lat+hl,c.lon+ll]],
        {color:'#4da3ff',weight:.5,fillOpacity:0.02*(c.n/maxN)+0.01})
        .bindPopup(`${c.n} servicios · celda 1km`).addTo(gridLayer);
    });
  }
  // 5 pines de moto recalculados según el filtro actual
  pinsLayer.clearLayers();
  if(pts.length>0){
    const cents=kmeans(pts,5,12);
    cents.sort((a,b)=>b.n-a.n).forEach((c,i)=>{
      L.marker([c.lat,c.lon],{icon:motoIcon})
        .bindPopup(`<b>Ubicación ${i+1}</b><br>Zona con ${c.n} servicios<br><small>Pin sobre el foco de mayor demanda</small>`)
        .addTo(pinsLayer);
    });
  }
}
function toggleLayer(k){
  show[k]=!show[k];
  document.getElementById(k==='heat'?'tHeat':'tGrid').classList.toggle('on',show[k]);
  if(k==='heat'){show.heat?heat.addTo(map):map.removeLayer(heat);}
  render();
}
document.getElementById('segDia').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON')return;
  [...e.currentTarget.children].forEach(b=>b.classList.remove('on'));
  e.target.classList.add('on');fDia=e.target.dataset.d;render();
});
document.getElementById('selFranja').addEventListener('change',e=>{fFranja=e.target.value;render();});

// poblar campañas
const selC=document.getElementById('selCampana');
DATA.campanas.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;selC.appendChild(o);});
selC.addEventListener('change',e=>{fCampana=e.target.value;render();});

// --- Plegar/desplegar panel de filtros (móvil y escritorio) ---
function toggleFiltros(){
  const p=document.getElementById('panel');
  const b=document.getElementById('btnFiltros');
  const movil=window.matchMedia('(max-width: 760px)').matches;
  let visible;
  if(movil){
    visible=p.classList.toggle('open');
  }else{
    // en escritorio parte visible; .hidden lo colapsa
    visible=!p.classList.toggle('hidden');
  }
  b.textContent=visible?'Filtros ▴':'Filtros ▾';
  setTimeout(()=>{map.invalidateSize();heat._draw&&heat._draw();},300);
}
window.addEventListener('resize',()=>{setTimeout(()=>map.invalidateSize(),200);});

// estado inicial del botón: en móvil el panel parte cerrado
(function(){
  const movil=window.matchMedia('(max-width: 760px)').matches;
  document.getElementById('btnFiltros').textContent = movil ? 'Filtros ▾' : 'Filtros ▴';
})();

render();
</script>
